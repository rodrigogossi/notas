services:
  app:
    image: rodrigogossi/notas:${NOTAS_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${NOTAS_PORT:-4000}:4000"
    environment:
      WEBDAV_USERNAME: ${WEBDAV_USERNAME}
      WEBDAV_PASSWORD: ${WEBDAV_PASSWORD}
      API_TOKEN: ${API_TOKEN}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:4000}
    volumes:
      # local real no host onde as notas são gravadas — troque NOTES_DATA_DIR no .env se quiser
      # apontar para outro lugar (outro disco, outro caminho já usado para backup, etc.)
      - ${NOTES_DATA_DIR:-./data}:/data

# Se você já tem um reverse proxy (Caddy/Nginx/Traefik) rodando em Docker e prefere não publicar a
# porta acima, comente o "ports:" e descomente as linhas abaixo (ajustando o nome da rede pra do
# seu proxy) — veja o README para o trecho de configuração do proxy.
#
#     networks:
#       - proxy_net
#
# networks:
#   proxy_net:
#     external: true
#     name: ${PROXY_NETWORK_NAME:-proxy_net}
